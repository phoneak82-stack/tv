name: EPG Auto Sync

on:
  schedule:
    # 🔄 ЕЖЕДНЕВНЫЙ ЗАПУСК (для тестов)
    - cron: '1 21 * * 0'  # Каждое воскресенье 21:01 UTC = понедельник 00:01 МСК
  # 🎯 РУЧНОЙ ЗАПУСК
  workflow_dispatch:

# 🔐 Права на запись в репозиторий
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚙️ Генерация epg.xml
        run: python3 ci_epg_sync.py
        env:
          EPG_URL: ${{ secrets.EPG_URL }}

      - name: 📤 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg.xml
          
          if git diff --staged --quiet; then
            echo "📭 Изменений нет, коммит пропущен"
          else
            git commit -m "📡 Авто-обновление EPG ($(date +'%d.%m.%Y %H:%M'))"
            git push
            echo "✅ Файл обновлён"
          fi
